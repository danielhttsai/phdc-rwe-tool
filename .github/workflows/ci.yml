name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  structure:
    # Fast guard on the frontend wiring + a clean docs build (only needs pytest).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest
      - name: Frontend structural tests (stdlib only)
        run: python -m pytest backend/test_frontend_structure.py -q
      - name: Build docs (must exit 0)
        run: python build_docs.py
      - name: Verify docs were generated
        run: test -f docs/index.html && test -f docs/app.js

  backend:
    # Full Python compute test suite.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run backend tests
        run: python -m pytest backend/ -q

  e2e:
    # Browser smoke test of the built docs/ (catches runtime/console errors).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Playwright
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run smoke tests (serves docs/ via http.server)
        run: npx playwright test
